<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <!-- Ensure mobile device dimensions fit perfectly without scaling or scrolling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PAW 交易軟體儀表板</title>
  
  <!-- PWA Support Meta Tags -->
  <meta name="theme-color" content="#0b0f19">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  
  <!-- CSS Stylesheets -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="app.css">
  
  <!-- TradingView Library -->
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 antialiased select-none">

  <!-- Main dynamic height wrapper (100dvh) -->
  <div class="h-dynamic-screen flex flex-col justify-between overflow-hidden">
    
    <!-- 1. Top Bar: Ticker (Jin10/Blocktempo News) -->
    <div class="h-8 bg-red-950/80 border-b border-red-900/40 text-xs flex items-center marquee-container font-mono shadow-md backdrop-blur-md">
      <div id="marquee-content" class="marquee-content text-red-200">
        <!-- JS will dynamically populate and duplicate this content for smooth looping -->
      </div>
    </div>
    
    <!-- 2. Header Asset Menu: Switch commodities -->
    <div class="h-12 bg-slate-900/90 border-b border-slate-800/80 flex justify-around items-center px-4 backdrop-blur-md shadow-sm z-10">
      <button data-asset="XAUUSD" class="asset-btn text-yellow-400 font-bold border-b-2 border-yellow-400 pb-1 px-3 text-sm transition-all focus:outline-none flex items-center gap-1.5">
        <span>🥇</span> <span>黃金 (Gold)</span>
      </button>
      <button data-asset="BTCUSD" class="asset-btn text-slate-400 pb-1 px-3 text-sm transition-all focus:outline-none flex items-center gap-1.5">
        <span>🪙</span> <span>BTC</span>
      </button>
      <button data-asset="ETHUSD" class="asset-btn text-slate-400 pb-1 px-3 text-sm transition-all focus:outline-none flex items-center gap-1.5">
        <span>💎</span> <span>ETH</span>
      </button>
    </div>
    
    <!-- 3. Main Views Container (Holds the 3 Tabs) -->
    <main class="flex-1 w-full relative overflow-hidden bg-slate-950">
      
      <!-- Tab 1: Market Intelligence (行情 & 情報) -->
      <section id="tab-charts" class="tab-pane active w-full h-full overflow-y-auto no-scrollbar p-4 pb-20 flex flex-col space-y-4">
        
        <!-- Asset Spot Price & Market Status Grid -->
        <div class="grid grid-cols-2 gap-3">
          <!-- Price Card -->
          <div class="bg-slate-900/80 p-4 rounded-2xl border border-slate-800/80 shadow-md space-y-1.5 flex flex-col justify-center">
            <div class="flex justify-between items-center text-xs text-slate-400">
              <span id="active-asset-name">🥇 黃金 Spot</span>
              <span id="price-change-badge" class="px-2 py-0.5 rounded font-bold text-[10px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">+0.00%</span>
            </div>
            <div class="text-2xl font-bold font-mono tracking-tight text-white py-1" id="spot-price-display">$0.00</div>
            <div class="flex justify-between text-[10px] text-slate-500">
              <span>H: <span id="price-high" class="font-mono text-slate-400">$0.00</span></span>
              <span>L: <span id="price-low" class="font-mono text-slate-400">$0.00</span></span>
            </div>
          </div>

          <!-- Market Intelligence Status Card -->
          <div class="bg-slate-900/80 p-4 rounded-2xl border border-slate-800/80 shadow-md space-y-1.5 flex flex-col justify-center text-xs text-slate-300">
            <div class="flex justify-between items-center text-slate-400 text-[10px] mb-0.5">
              <span>市場狀態判斷</span>
              <span class="text-neon-blue font-bold">LIVE</span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-400">RSI (14):</span>
              <span class="font-mono font-bold" id="status-rsi">--</span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-400">MACD (12,26):</span>
              <span class="font-bold" id="status-macd">--</span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-400">當前趨勢:</span>
              <span class="font-bold text-yellow-400" id="status-trend">--</span>
            </div>
          </div>
        </div>

        <!-- Fear & Greed Index Card -->
        <div class="bg-slate-900/80 p-4 rounded-2xl border border-slate-800/80 shadow-md flex justify-between items-center">
          <div class="space-y-1">
            <h4 class="text-xs text-slate-400">恐懼與貪婪指數 (Fear & Greed)</h4>
            <div class="flex items-baseline gap-2">
              <span class="text-xl font-bold font-mono text-white" id="fng-value">--</span>
              <span class="text-xs font-bold text-emerald-400" id="fng-class">--</span>
            </div>
          </div>
          <!-- Gauge Mini Bar -->
          <div class="w-32 bg-slate-800 h-2.5 rounded-full overflow-hidden border border-slate-700">
            <div id="fng-bar-fill" class="h-full bg-gradient-to-r from-red-500 via-yellow-400 to-emerald-400 transition-all duration-500" style="width: 0%"></div>
          </div>
        </div>

        <!-- Rumors & Whispers Section -->
        <div class="bg-slate-900/80 p-4 rounded-2xl border border-slate-800/80 shadow-md space-y-3">
          <div class="flex justify-between items-center border-b border-slate-800 pb-2">
            <h3 class="text-xs font-bold text-red-400 flex items-center gap-1.5">
              <span>⚠️</span> 第一手即時情報 (包含未查證傳言)
            </h3>
            <span class="animate-pulse flex h-2 w-2 relative">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
            </span>
          </div>
          
          <!-- Rumors Container -->
          <div class="space-y-3" id="rumors-container">
            <!-- Dynamic elements loaded via JS -->
          </div>
        </div>

        <!-- Heatmap Section -->
        <div class="bg-slate-900/80 p-4 rounded-2xl border border-slate-800/80 shadow-md flex flex-col flex-1 min-h-[300px]">
          <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-3">
            <h3 class="text-xs font-bold text-white flex items-center gap-1.5">
              <span>🔥</span> 即時板塊熱力圖 (Heatmap)
            </h3>
            <span class="text-[10px] text-slate-500">TradingView 提供</span>
          </div>
          <div class="flex-1 w-full rounded-xl overflow-hidden relative" id="heatmap-wrapper">
            <!-- Dynamic heatmap loaded via JS -->
          </div>
        </div>

      </section>
      
      <!-- Tab 2: Sentiment (籌碼) - Scrollable list -->
      <section id="tab-sentiment" class="tab-pane hidden w-full h-full overflow-y-auto no-scrollbar p-4 pb-20">
        <div id="sentiment-data-container" class="max-w-md mx-auto space-y-4">
          <!-- Rendered dynamically by app.js -->
        </div>
      </section>
      
      <!-- Tab 3: Macro (宏觀) - Scrollable list -->
      <section id="tab-macro" class="tab-pane hidden w-full h-full overflow-y-auto no-scrollbar p-4 pb-20">
        <div id="macro-data-container" class="max-w-md mx-auto space-y-4">
          <!-- Rendered dynamically by app.js -->
        </div>
      </section>
      
    </main>
    
    <!-- 4. Bottom Navigation Menu -->
    <nav class="h-16 bg-slate-900/95 border-t border-slate-800/90 flex justify-around items-center px-4 pb-safe shadow-2xl z-25 backdrop-blur-xl">
      <button data-tab="charts" class="tab-btn text-blue-400 flex flex-col items-center justify-center w-20 py-2 focus:outline-none active:scale-95 transition-transform">
        <span class="text-xl mb-0.5">📊</span>
        <span class="text-[10px] font-semibold tracking-wider">行情</span>
      </button>
      
      <button data-tab="sentiment" class="tab-btn text-slate-400 flex flex-col items-center justify-center w-20 py-2 focus:outline-none active:scale-95 transition-transform">
        <span class="text-xl mb-0.5">🔥</span>
        <span class="text-[10px] font-semibold tracking-wider">籌碼</span>
      </button>
      
      <button data-tab="macro" class="tab-btn text-slate-400 flex flex-col items-center justify-center w-20 py-2 focus:outline-none active:scale-95 transition-transform">
        <span class="text-xl mb-0.5">📅</span>
        <span class="text-[10px] font-semibold tracking-wider">宏觀</span>
      </button>
    </nav>
    
  </div>

  <!-- Main JavaScript File -->
  <script src="app.js"></script>
</body>
</html>
