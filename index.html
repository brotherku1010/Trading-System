<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <!-- Ensure mobile device dimensions fit perfectly without scaling or scrolling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PAW 交易軟體儀表板</title>
  
  <!-- PWA Support Meta Tags -->
  <meta name="theme-color" content="#0b0f19">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  
  <!-- CSS Stylesheets -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="app.css">
  
  <!-- TradingView Library -->
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 antialiased select-none">

  <!-- Main dynamic height wrapper (100dvh) -->
  <div class="h-dynamic-screen flex flex-col justify-between overflow-hidden">
    
    <!-- 1. Top Bar: Ticker (Jin10/Blocktempo News) -->
    <div class="h-8 bg-red-950/80 border-b border-red-900/40 text-xs flex items-center marquee-container font-mono shadow-md backdrop-blur-md">
      <div id="marquee-content" class="marquee-content text-red-200">
        <!-- JS will dynamically populate and duplicate this content for smooth looping -->
      </div>
    </div>
    
    <!-- 2. Header Asset Menu: Switch commodities -->
    <div class="h-12 bg-slate-900/90 border-b border-slate-800/80 flex justify-around items-center px-4 backdrop-blur-md shadow-sm z-10">
      <button data-asset="XAUUSD" class="asset-btn text-yellow-400 font-bold border-b-2 border-yellow-400 pb-1 px-3 text-sm transition-all focus:outline-none flex items-center gap-1.5">
        <span>🥇</span> <span>黃金 (Gold)</span>
      </button>
      <button data-asset="BTCUSD" class="asset-btn text-slate-400 pb-1 px-3 text-sm transition-all focus:outline-none flex items-center gap-1.5">
        <span>🪙</span> <span>BTC</span>
      </button>
      <button data-asset="ETHUSD" class="asset-btn text-slate-400 pb-1 px-3 text-sm transition-all focus:outline-none flex items-center gap-1.5">
        <span>💎</span> <span>ETH</span>
      </button>
    </div>
    
    <!-- 3. Main Views Container (Holds the 3 Tabs) -->
    <main class="flex-1 w-full relative overflow-hidden bg-slate-950">
      
      <!-- Tab 1: Charts (TradingView) -->
      <section id="tab-charts" class="tab-pane active w-full h-full relative">
        <div id="tradingview_chart_wrapper" class="w-full h-full opacity-0">
          <div id="tradingview_chart" class="w-full h-full"></div>
        </div>
      </section>
      
      <!-- Tab 2: Sentiment (籌碼) - Scrollable list -->
      <section id="tab-sentiment" class="tab-pane hidden w-full h-full overflow-y-auto no-scrollbar p-4 pb-20">
        <div id="sentiment-data-container" class="max-w-md mx-auto space-y-4">
          <!-- Rendered dynamically by app.js -->
        </div>
      </section>
      
      <!-- Tab 3: Macro (宏觀) - Scrollable list -->
      <section id="tab-macro" class="tab-pane hidden w-full h-full overflow-y-auto no-scrollbar p-4 pb-20">
        <div id="macro-data-container" class="max-w-md mx-auto space-y-4">
          <!-- Rendered dynamically by app.js -->
        </div>
      </section>
      
    </main>
    
    <!-- 4. Bottom Navigation Menu -->
    <nav class="h-16 bg-slate-900/95 border-t border-slate-800/90 flex justify-around items-center px-4 pb-safe shadow-2xl z-25 backdrop-blur-xl">
      <button data-tab="charts" class="tab-btn text-blue-400 flex flex-col items-center justify-center w-20 py-2 focus:outline-none active:scale-95 transition-transform">
        <span class="text-xl mb-0.5">📊</span>
        <span class="text-[10px] font-semibold tracking-wider">圖表</span>
      </button>
      
      <button data-tab="sentiment" class="tab-btn text-slate-400 flex flex-col items-center justify-center w-20 py-2 focus:outline-none active:scale-95 transition-transform">
        <span class="text-xl mb-0.5">🔥</span>
        <span class="text-[10px] font-semibold tracking-wider">籌碼</span>
      </button>
      
      <button data-tab="macro" class="tab-btn text-slate-400 flex flex-col items-center justify-center w-20 py-2 focus:outline-none active:scale-95 transition-transform">
        <span class="text-xl mb-0.5">📅</span>
        <span class="text-[10px] font-semibold tracking-wider">宏觀</span>
      </button>
    </nav>
    
  </div>

  <!-- Main JavaScript File -->
  <script src="app.js"></script>
</body>
</html>
